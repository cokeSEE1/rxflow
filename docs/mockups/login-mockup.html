<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RxFlow — 登录</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-900: #134e4a;
    --teal-700: #0f766e;
    --teal-500: #14b8a6;
    --teal-100: #ccfbf1;
    --coral: #f43f5e;
    --warm-50: #fafaf9;
    --warm-100: #f5f5f4;
    --warm-200: #e7e5e4;
    --warm-700: #44403c;
    --warm-900: #1c1917;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--warm-50);
    color: var(--warm-900);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* Geometric medical pattern background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 80%, var(--teal-100) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, #f0fdfa 0%, transparent 50%),
      linear-gradient(135deg, var(--warm-50) 0%, #fafaf9 100%);
    z-index: -2;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(15, 118, 110, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15, 118, 110, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: -1;
  }
  .login-container {
    display: flex;
    width: 900px;
    min-height: 540px;
    background: #fff;
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .brand-panel {
    flex: 1;
    background: linear-gradient(160deg, var(--teal-900) 0%, #0d5c56 40%, var(--teal-700) 100%);
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .brand-panel::before {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 240px;
    height: 240px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
  }
  .brand-panel::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 180px;
    height: 180px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .brand-logo {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 36px;
    color: #fff;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }
  .brand-logo span {
    color: var(--teal-500);
  }
  .brand-tagline {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
    margin-bottom: 32px;
  }
  .brand-features {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .brand-feature {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
  }
  .brand-feature .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .brand-footer {
    position: relative;
    z-index: 1;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
  }
  .form-panel {
    flex: 1;
    padding: 48px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .form-panel h2 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 28px;
    color: var(--warm-900);
    margin-bottom: 4px;
  }
  .form-panel .subtitle {
    font-size: 14px;
    color: var(--warm-700);
    margin-bottom: 36px;
  }
  .input-group {
    margin-bottom: 20px;
  }
  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--warm-700);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .input-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--warm-200);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    background: var(--warm-50);
    outline: none;
  }
  .input-group input:focus {
    border-color: var(--teal-500);
    box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
    background: #fff;
  }
  .input-group input::placeholder {
    color: #c0bdb8;
  }
  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--teal-700);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 0.3px;
  }
  .btn-login:hover {
    background: var(--teal-900);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
  }
  .btn-login:active {
    transform: translateY(0);
  }
  .test-hint {
    margin-top: 24px;
    padding: 16px;
    background: var(--warm-100);
    border-radius: 10px;
    font-size: 11px;
    color: var(--warm-700);
    line-height: 1.8;
  }
  .test-hint strong {
    color: var(--teal-700);
    font-size: 12px;
  }
  .role-switcher {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .role-chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--warm-200);
    background: #fff;
    color: var(--warm-700);
    transition: all 0.2s;
  }
  .role-chip:hover {
    border-color: var(--teal-500);
    color: var(--teal-700);
  }
  .role-chip.active {
    background: var(--teal-100);
    border-color: var(--teal-500);
    color: var(--teal-700);
  }
  .animate-in {
    animation: fadeSlideIn 0.5s ease-out;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="login-container animate-in">
  <div class="brand-panel">
    <div>
      <div class="brand-logo">Rx<span>Flow</span></div>
      <div class="brand-tagline">处方配送管理平台</div>
      <div class="brand-features">
        <div class="brand-feature">
          <div class="icon">📋</div>
          <span>四角色协作 — 助理·医生·快递员·患者</span>
        </div>
        <div class="brand-feature">
          <div class="icon">🔄</div>
          <span>六状态流转 — 草稿→审核→配送→签收</span>
        </div>
        <div class="brand-feature">
          <div class="icon">🔒</div>
          <span>角色权限隔离 — 每人只看到该看的内容</span>
        </div>
      </div>
    </div>
    <div class="brand-footer">RxFlow v1.0 · Healthcare Logistics</div>
  </div>

  <div class="form-panel">
    <h2>欢迎回来</h2>
    <p class="subtitle">选择角色并登录您的账号</p>

    <div class="role-switcher" id="roleSwitcher">
      <div class="role-chip active" data-phone="13800001111" data-name="李助理" onclick="switchRole(this, 'assistant')">👨‍💼 医生助理</div>
      <div class="role-chip" data-phone="13800002222" data-name="张医生" onclick="switchRole(this, 'doctor')">👨‍⚕️ 医生</div>
      <div class="role-chip" data-phone="13800003333" data-name="王师傅" onclick="switchRole(this, 'courier')">📦 快递员</div>
      <div class="role-chip" data-phone="13800004444" data-name="赵建国" onclick="switchRole(this, 'patient')">🏥 患者</div>
    </div>

    <div class="input-group">
      <label for="phoneInput">手机号</label>
      <input type="text" id="phoneInput" value="13800001111" placeholder="请输入手机号">
    </div>
    <div class="input-group">
      <label for="passwordInput">密码</label>
      <input type="password" id="passwordInput" value="123456" placeholder="请输入密码">
    </div>

    <button class="btn-login" onclick="handleLogin()">登 录</button>

    <div class="test-hint">
      <strong>🧪 测试环境</strong><br>
      所有角色密码统一为 <strong>123456</strong><br>
      点击上方角色标签快速切换
    </div>
  </div>
</div>

<script>
function switchRole(chip, role) {
  document.querySelectorAll('.role-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  document.getElementById('phoneInput').value = chip.dataset.phone;
  document.getElementById('passwordInput').value = '123456';
}

function handleLogin() {
  const phone = document.getElementById('phoneInput').value;
  const btn = document.querySelector('.btn-login');
  btn.textContent = '登录中...';
  btn.style.opacity = '0.7';
  setTimeout(() => {
    btn.textContent = '✓ 登录成功';
    btn.style.background = '#059669';
    btn.style.opacity = '1';
  }, 800);
}
</script>
</body>
</html>
